async function saveimage(lat, lng, file, titel, description, date, trip) {

    let savedMarkers = await localforage.getItem('my_markers') || [];

    savedMarkers.push({
        lat: lat,
        lng: lng,
        photo: file,
        titel: titel,
        description: description,
        date: date,
        trip: trip
    });

    await localforage.setItem('my_markers', savedMarkers);
}

let loadedmarkers;

async function loadimage() {

    let savedMarkers = await localforage.getItem('my_markers') || [];
    loadedmarkers = savedMarkers;

    for(let i = 0; i < savedMarkers.length; i++){

        const photoUrl = URL.createObjectURL(savedMarkers[i].photo);

        var ncircle = L.divIcon({
                        className: 'divicon',
                        html: `<div class="divcirkel"><img src="${photoUrl}"></div>`,
                        iconSize: [50, 50],
                        iconAnchor: [25, 25]
                    });

        const marker = L.marker([savedMarkers[i].lat, savedMarkers[i].lng], { icon: ncircle });
        marker.on('click', function (){
            map.setView([savedMarkers[i].lat, savedMarkers[i].lng], 13);
            getpopup(i);
        });
        markers.addLayer(marker);

        var el = document.createElement("img");
        el.className = "galleryimg";
        el.src = photoUrl;
        el.onclick = function() {
            getfullpopup(i);
        };
        document.getElementById("gallery").appendChild(el);
    }

}

    var description = loadedmarkers[hvl].description;
    var imgg = URL.createObjectURL(loadedmarkers[hvl].photo);
    var imglatt = Number(loadedmarkers[hvl].lat.toFixed(6));
    var imglngg = Number(loadedmarkers[hvl].lng.toFixed(6));
    var datum = new Date(loadedmarkers[hvl].date);

    document.getElementById("fullpopupimg").src = imgg;
    document.getElementById("fullpopupimg").style.backgroundSize = "contain";

    document.getElementById("blurlaag").style.background = `url(${imgg})`;
    document.getElementById("blurlaag").style.backgroundSize = "cover";
    document.getElementById("blurlaag").style.backgroundPosition = "center";
    document.getElementById("blurlaag").style.backgroundRepeat = "no-repeat";

    document.getElementById("fullimgcoord").innerHTML = imglatt + " , " + imglngg;

    document.getElementById("fullimgdate").innerHTML = datum.getDate() + " " + datum.toLocaleString("en-US", {month:"long"}) + " " + datum.getFullYear();

async function savetrip(file, titel, date1, date2) {

    let savedTrips = await localforage.getItem('my_trips') || [];

    savedTrips.push({
        cover: file,
        titel: titel,
        date1: date1,
        date2: date2,
    });

    await localforage.setItem('my_trips', savedTrips);
    loadtrip();
}

var recentefoto = -1;
function opwelkegescrollt(){
    var viewerHoogte = document.getElementById("tripviewer").offsetHeight;
    // hoeveel van links / breedte van 1 foto ding afgerond  => op welke foto gescrollt
    var welkefoto = Math.round(document.getElementById("tripscroll").scrollLeft / document.getElementById("tripscroll").offsetWidth);
    var panhoogte = document.getElementById("tripscroll").offsetHeight - (document.body.offsetHeight / 2) + ((document.body.offsetHeight - document.getElementById("tripscroll").offsetHeight) / 2) - 10;

    if(welkefoto != recentefoto){
        var scrollfotoloca = document.getElementById(`tripimgcoord${welkefoto + 1}`);

        var coordnrpunt = map.project([scrollfotoloca.dataset.lat, scrollfotoloca.dataset.lng], 10);
        coordnrpunt.y += panhoogte;
        var puntnrcoord = map.unproject(coordnrpunt,10);
        map.setView(puntnrcoord, 10, {animate:true, duration:1.5});

        recentefoto = welkefoto;
    }
}

}
